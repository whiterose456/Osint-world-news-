<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT World News</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            black: '#020617',
                            dark: '#0f172a',
                            green: '#22c55e',
                            greenDim: 'rgba(34, 197, 94, 0.1)',
                            blue: '#3b82f6',
                            red: '#ef4444',
                        }
                    },
                    fontFamily: {
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #020617;
            color: #e2e8f0;
        }

        .leaflet-container {
            background: #020617;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Real Data Integration ---

        const HOTSPOTS = [
            { name: "Washington D.C.", coords: [38.9072, -77.0369] },
            { name: "London", coords: [51.5074, -0.1278] },
            { name: "Moscow", coords: [55.7558, 37.6173] },
            { name: "Beijing", coords: [39.9042, 116.4074] },
            { name: "Tokyo", coords: [35.6762, 139.6503] },
            { name: "Berlin", coords: [52.5200, 13.4050] },
            { name: "Paris", coords: [48.8566, 2.3522] },
            { name: "New Delhi", coords: [28.6139, 77.2090] },
            { name: "Kyiv", coords: [50.4501, 30.5234] },
            { name: "Tehran", coords: [35.6892, 51.3890] },
            { name: "Jerusalem", coords: [31.7683, 35.2137] },
            { name: "Taipei", coords: [25.0330, 121.5654] },
            { name: "Seoul", coords: [37.5665, 126.9780] },
            { name: "Brussels", coords: [50.8503, 4.3517] },
            { name: "Cairo", coords: [30.0444, 31.2357] }
        ];

        const determineSeverity = (text) => {
            const critical = ['war', 'attack', 'kill', 'dead', 'blast', 'explosion', 'nuclear', 'crisis'];
            const high = ['threat', 'warning', 'sanction', 'cyber', 'hack', 'breach', 'military', 'strike'];

            text = text.toLowerCase();
            if (critical.some(w => text.includes(w))) return 'critical';
            if (high.some(w => text.includes(w))) return 'high';
            return 'medium';
        };

        const determineType = (text) => {
            text = text.toLowerCase();
            if (text.includes('cyber') || text.includes('hack') || text.includes('data')) return 'cyber';
            if (text.includes('protest') || text.includes('march') || text.includes('rally')) return 'protest';
            return 'conflict'; // Default generic type
        };

        // --- Components ---

        const Icon = ({ name, size = 16, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Header = () => (
            <header className="h-14 border-b border-green-900/50 bg-cyber-dark/80 flex items-center px-4 justify-between backdrop-blur-md fixed top-0 w-full z-50">
                <div className="flex items-center gap-2 text-cyber-green">
                    <Icon name="globe" size={24} />
                    <h1 className="font-mono font-bold text-lg tracking-wider">OSINT<span className="text-white">WORLD</span></h1>
                </div>
                <div className="flex items-center gap-4 text-xs font-mono text-slate-400">
                    <div className="flex items-center gap-1">
                        <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        LIVE FEED
                    </div>
                    <div>SYSTEM: ONLINE</div>
                </div>
            </header>
        );

        const NewsCard = ({ item, onClick }) => {
            const severityColor = item.severity === 'critical' ? 'text-red-500 border-red-500/30' :
                item.severity === 'high' ? 'text-orange-500 border-orange-500/30' :
                    'text-blue-400 border-blue-500/30';

            return (
                <div
                    onClick={() => onClick(item)}
                    className={`p-3 mb-2 border-l-2 bg-slate-900/50 hover:bg-slate-800 cursor-pointer transition-all group ${severityColor.split(' ')[1]}`}
                >
                    <div className="flex justify-between items-start mb-1">
                        <span className={`text-[10px] font-bold uppercase px-1.5 py-0.5 rounded bg-slate-950 border ${severityColor}`}>
                            {item.type}
                        </span>
                        <span className="text-[10px] text-slate-500 font-mono">{item.time}</span>
                    </div>
                    <h3 className="text-sm font-bold text-slate-200 group-hover:text-white mb-1">{item.title}</h3>
                    <p className="text-xs text-slate-400 line-clamp-2">{item.summary}</p>
                    <div className="mt-2 flex items-center gap-1 text-[10px] text-slate-600 font-mono">
                        <Icon name="rss" size={10} /> {item.source}
                    </div>
                </div>
            );
        };

        const Sidebar = ({ items, onSelect, loading }) => (
            <div className="w-80 h-full bg-cyber-dark border-r border-green-900/30 flex flex-col pt-14">
                <div className="p-3 border-b border-slate-800">
                    <input
                        type="text"
                        placeholder="SEARCH INTEL..."
                        className="w-full bg-slate-950 border border-slate-800 text-slate-300 text-xs p-2 rounded focus:outline-none focus:border-cyber-green font-mono"
                    />
                </div>
                <div className="flex-1 overflow-y-auto p-2">
                    {loading ? (
                        <div className="text-center text-slate-500 mt-10 font-mono text-xs animate-pulse">
                            INITIALIZING UPLINK...
                        </div>
                    ) : (
                        items.map(item => (
                            <NewsCard key={item.id} item={item} onClick={onSelect} />
                        ))
                    )}
                </div>
            </div>
        );

        const MapView = ({ items, selectedItem }) => {
            const mapRef = useRef(null);
            const markersRef = useRef({});

            useEffect(() => {
                if (!mapRef.current) {
                    // Initialize Map
                    mapRef.current = L.map('map-container', {
                        zoomControl: false,
                        attributionControl: false
                    }).setView([20, 0], 2);

                    // Dark Matter Tiles
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        maxZoom: 19
                    }).addTo(mapRef.current);
                }

                // Clear existing markers
                Object.values(markersRef.current).forEach(marker => marker.remove());
                markersRef.current = {};

                // Add markers
                items.forEach(item => {
                    const color = item.severity === 'critical' ? '#ef4444' :
                        item.severity === 'high' ? '#f97316' : '#3b82f6';

                    const markerHtml = `
                        <div style="
                            background-color: ${color};
                            width: 10px;
                            height: 10px;
                            border-radius: 50%;
                            box-shadow: 0 0 10px ${color};
                            border: 2px solid #fff;
                        "></div>
                    `;

                    const icon = L.divIcon({
                        className: 'custom-marker',
                        html: markerHtml,
                        iconSize: [10, 10],
                        iconAnchor: [5, 5]
                    });

                    const marker = L.marker(item.location, { icon })
                        .bindPopup(`
                            <div class="font-sans text-slate-900">
                                <h3 class="font-bold">${item.title}</h3>
                                <p class="text-xs">${item.summary}</p>
                            </div>
                        `)
                        .addTo(mapRef.current);

                    markersRef.current[item.id] = marker;
                });

            }, [items]);

            useEffect(() => {
                if (selectedItem && mapRef.current) {
                    mapRef.current.flyTo(selectedItem.location, 8, {
                        animate: true,
                        duration: 1.5
                    });

                    const marker = markersRef.current[selectedItem.id];
                    if (marker) {
                        marker.openPopup();
                    }
                }
            }, [selectedItem]);

            return <div id="map-container" className="flex-1 h-full bg-slate-950 pt-14 relative z-0"></div>;
        };

        const App = () => {
            const [news, setNews] = useState([]);
            const [selectedNews, setSelectedNews] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchNews = async () => {
                    try {
                        // Use rss2json to get BBC World News
                        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=http://feeds.bbci.co.uk/news/world/rss.xml');
                        const data = await response.json();

                        if (data.status === 'ok') {
                            const processedNews = data.items.map((item, index) => {
                                // Randomly assign a hotspot
                                const hotspot = HOTSPOTS[Math.floor(Math.random() * HOTSPOTS.length)];

                                return {
                                    id: index,
                                    title: item.title,
                                    summary: item.description, // Note: BBC descriptions might be short
                                    location: hotspot.coords,
                                    type: determineType(item.title),
                                    severity: determineSeverity(item.title),
                                    source: "BBC World",
                                    time: new Date(item.pubDate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                                };
                            });
                            setNews(processedNews);
                        }
                    } catch (error) {
                        console.error("Failed to fetch news:", error);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchNews();
            }, []);

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-cyber-black text-slate-200 font-sans">
                    <Header />
                    <div className="flex w-full h-full">
                        <Sidebar items={news} onSelect={setSelectedNews} loading={loading} />
                        <MapView items={news} selectedItem={selectedNews} />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
